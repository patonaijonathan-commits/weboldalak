        }

        .profile-header {
            display: flex;
            margin-bottom: 44px;
            align-items: center;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-right: 60px;
            object-fit: cover;
            border: 3px solid #dbdbdb;
        }

        .profile-info {
            flex: 1;
        }

        .profile-username {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 20px;
            color: #262626;
        }

        .profile-stats {
            display: flex;
            margin-bottom: 20px;
            gap: 40px;
        }

        .stat-item {
            color: #262626;
            font-size: 16px;
        }

        .stat-number {
            font-weight: 600;
        }

        .profile-details {
            margin-bottom: 20px;
        }

        .profile-detail {
            margin-bottom: 8px;
            font-size: 16px;
        }

        .profile-detail strong {
            color: #262626;
            margin-right: 5px;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
        }

        .post-item {
            aspect-ratio: 1;
            position: relative;
            overflow: hidden;
            border-radius: 3px;
            background-color: #f0f0f0;
        }

        .post-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .post-item:hover .post-image {
            transform: scale(1.05);
        }

        .post-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: white;
            font-weight: 600;
        }

        .post-item:hover .post-overlay {
            opacity: 1;
        }

        .header-nav {
            background: white;
            border-bottom: 1px solid #dbdbdb;
            padding: 0 20px;
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 935px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 54px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #262626;
            text-decoration: none;
        }

        .nav-icons {
            display: flex;
            gap: 22px;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-image {
                margin-right: 0;
                margin-bottom: 30px;
                width: 120px;
                height: 120px;
            }

            .profile-stats {
                justify-content: center;
            }

            .posts-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .posts-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .container {
                padding: 20px 15px;
            }
        }
