<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #262626;
            line-height: 1.6;
        }

        .container {
            max-width: 975px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .profile-header {
            display: flex;
            margin-bottom: 44px;
            align-items: center;
            gap: 30px;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #dbdbdb;
        }

        .profile-info {
            flex: 1;
        }

        .profile-username {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 20px;
            color: #262626;
        }

        .profile-stats {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
        }

        .stat {
            font-size: 16px;
        }

        .stat-number {
            font-weight: 600;
        }

        .profile-details {
            font-size: 16px;
            line-height: 1.5;
        }

        .profile-details div {
            margin-bottom: 5px;
        }

        .contact-info {
            color: #8e8e8e;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            margin-top: 50px;
        }

        .post-item {
            aspect-ratio: 1;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            background-color: #f0f0f0;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .post-item:hover img {
            transform: scale(1.05);
        }

        .posts-header {
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #dbdbdb;
            margin-top: 44px;
            padding-top: 20px;
            margin-bottom: 20px;
        }

        .posts-tab {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #262626;
            text-decoration: none;
            border-top: 1px solid #262626;
            padding-top: 20px;
            margin-top: -21px;
        }

        .posts-icon {
            width: 12px;
            height: 12px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 16px;
            }

            .profile-header {
                gap: 20px;
                margin-bottom: 30px;
            }

            .profile-image {
                width: 100px;
                height: 100px;
            }

            .profile-username {
                font-size: 24px;
                margin-bottom: 15px;
            }

            .profile-stats {
                gap: 20px;
                font-size: 14px;
            }

            .posts-grid {
                gap: 2px;
                margin-top: 30px;
            }

            .profile-details {
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-stats {
                justify-content: center;
            }
        }
    </style>
</head>
