        }

            width: 150px;
            height: 150px;

            font-size: 28px;

            margin-bottom: 5px;

        .contact-info {
            color: #00376b;

        .tabs {
            display: flex;

        .tab {
            padding: 15px 20px;

            letter-spacing: 1px;

            color: #8e8e8e;
        }

        .tab.active {
            border-top: 1px solid #262626;

        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
        }

        .post-item {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .post-item:hover img {
            transform: scale(1.05);
        }

        .post-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .post-item:hover .post-overlay {
            opacity: 1;
        }

        .overlay-stats {
            display: flex;
            gap: 30px;
            color: white;
            font-weight: 600;
        }

        .overlay-stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
                gap: 30px;
            }

            .profile-image {
                width: 120px;
                height: 120px;
            }

            .posts-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }

            .profile-stats {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .posts-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }
    </style>
</head>
