            background: white;

            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            padding: 0 20px;
        }

        .header-content {
            max-width: 935px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 54px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #262626;
            text-decoration: none;
        }

        .search-bar {
            background: #efefef;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 14px;
            width: 268px;
            outline: none;
        }

        .nav-icons {
            display: flex;
            gap: 22px;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
            fill: #262626;
        }

        .profile-header {
            display: flex;
            margin-bottom: 44px;
            align-items: flex-start;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-right: 80px;
            object-fit: cover;
        }

        .profile-info {
            flex: 1;
        }

        .profile-username {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .edit-profile-btn {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 5px 9px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .profile-stats {
            display: flex;
            margin-bottom: 20px;
            gap: 40px;
        }

        .stat {
            font-size: 16px;
        }

        .stat-number {
            font-weight: 600;
        }

        .profile-bio {
            font-size: 16px;
            line-height: 24px;
        }

        .profile-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .tabs {
            border-top: 1px solid #dbdbdb;
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .tab {
            padding: 16px 0;
            margin: 0 30px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8e8e8e;
            cursor: pointer;
            border-top: 1px solid transparent;
        }

        .tab.active {
            color: #262626;
            border-top-color: #262626;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
        }

        .post {
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }

        .post img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            color: white;
            font-weight: 600;
            gap: 20px;
        }

        .post:hover .post-overlay {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .container {
                padding: 60px 16px 20px;
            }

            .profile-header {
                margin-bottom: 32px;
            }

            .profile-image {
                width: 77px;
                height: 77px;
                margin-right: 28px;
            }

            .profile-username {
                font-size: 22px;
                margin-bottom: 12px;
            }

            .profile-stats {
                gap: 20px;
                font-size: 14px;
            }

            .posts-grid {
                gap: 3px;
            }

            .search-bar {
                display: none;
            }
        }
    </style>
</head>
