<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #262626;
        }

        .container {
            max-width: 935px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 44px;
            padding: 0 20px;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-right: 80px;
            object-fit: cover;
            border: 3px solid #dbdbdb;
        }

        .profile-info h1 {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .profile-stats {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
        }

        .stat {
            font-size: 16px;
        }

        .stat-number {
            font-weight: 600;
        }

        .profile-details {
            font-size: 16px;
            line-height: 1.5;
        }

        .profile-details .city {
            color: #8e8e8e;
            margin-top: 5px;
        }

        .profile-details .phone {
            margin-top: 5px;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(293px, 1fr));
            gap: 28px;
            margin-top: 40px;
        }

        .post-item {
            aspect-ratio: 1;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .post-item:hover img {
            transform: scale(1.05);
        }

        .tabs {
            border-top: 1px solid #dbdbdb;
            margin-top: 44px;
            padding-top: 0;
        }

        .tab-content {
            padding-top: 28px;
        }

        .tab-header {
            text-align: center;
            padding: 16px 0;
            color: #262626;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid #262626;
            margin-top: -1px;
            width: 60px;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-image {
                margin-right: 0;
                margin-bottom: 30px;
                width: 120px;
                height: 120px;
            }

            .profile-stats {
                justify-content: center;
            }

            .posts-grid {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
            }

            .container {
                padding: 20px 10px;
            }
        }

        @media (max-width: 480px) {
            .profile-stats {
                gap: 20px;
            }

            .posts-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .profile-image {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>
