<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #fafafa;
            color: #262626;
        }

        .container {
            max-width: 935px;
            margin: 0 auto;
            padding: 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 44px;
            padding: 0 20px;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-right: 50px;
            object-fit: cover;
            border: 3px solid #dbdbdb;
        }

        .profile-info {
            flex: 1;
        }

        .profile-username {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .profile-stats {
            display: flex;
            margin-bottom: 20px;
        }

        .profile-stat {
            margin-right: 40px;
        }

        .profile-stat-number {
            font-weight: 600;
        }

        .profile-bio {
            line-height: 1.5;
        }

        .profile-bio-item {
            margin-bottom: 5px;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            margin-top: 20px;
        }

        .post-item {
            aspect-ratio: 1;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .post-item:hover img {
            transform: scale(1.05);
        }

        .tabs {
            display: flex;
            justify-content: center;
            border-top: 1px solid #dbdbdb;
            margin-top: 44px;
            margin-bottom: 12px;
        }

        .tab {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            color: #8e8e8e;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-top: 1px solid transparent;
        }

        .tab.active {
            color: #262626;
            border-top: 1px solid #262626;
        }

        .tab-icon {
            width: 12px;
            height: 12px;
            margin-right: 6px;
        }

        @media (max-width: 735px) {
            .profile-header {
                padding: 0;
            }

            .profile-image {
                width: 77px;
                height: 77px;
                margin-right: 28px;
            }

            .profile-username {
                font-size: 24px;
            }

            .profile-stat {
                margin-right: 20px;
            }

            .posts-grid {
                gap: 2px;
            }
        }
    </style>
</head>
