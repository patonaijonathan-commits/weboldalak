<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #fafafa;
            color: #262626;
        }

        .container {
            max-width: 935px;
            margin: 0 auto;
            padding: 20px;
        }

        .profile-header {
            display: flex;
            margin-bottom: 44px;
            align-items: center;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin-right: 60px;
            object-fit: cover;
            border: 1px solid #dbdbdb;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 20px;
        }

        .profile-stats {
            display: flex;
            margin-bottom: 20px;
            gap: 40px;
        }

        .stat {
            font-size: 16px;
        }

        .stat-number {
            font-weight: 600;
        }

        .profile-details {
            font-size: 16px;
            line-height: 1.5;
        }

        .profile-details strong {
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .profile-details .location,
        .profile-details .phone {
            color: #8e8e8e;
            margin-bottom: 3px;
        }

        .posts-header {
            border-top: 1px solid #dbdbdb;
            padding-top: 44px;
            margin-bottom: 28px;
            text-align: center;
        }

        .posts-header h2 {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #262626;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 28px;
        }

        .post-item {
            aspect-ratio: 1;
            position: relative;
            overflow: hidden;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 3px;
            transition: transform 0.2s ease;
        }

        .post-item:hover img {
            transform: scale(1.05);
        }

        .empty-post {
            background-color: #f0f0f0;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8e8e8e;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .profile-header {
                margin-bottom: 24px;
            }

            .profile-image {
                width: 77px;
                height: 77px;
                margin-right: 28px;
            }

            .profile-name {
                font-size: 20px;
                margin-bottom: 12px;
            }

            .profile-stats {
                gap: 20px;
                font-size: 14px;
            }

            .posts-grid {
                gap: 3px;
            }

            .posts-header {
                padding-top: 24px;
                margin-bottom: 16px;
            }
        }
    </style>
</head>
