        }

        .container {

        /* Navigation */
        .navbar {
            position: fixed;

            z-index: 1000;
            padding: 15px 0;
            box-shadow: 0 2px 20px rgba(197, 153, 156, 0.1);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--dark-rose);
        }

        .nav-links {

        }

        .nav-links a {
            text-decoration: none;

            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--dark-rose);

            font-weight: 500;
            transition: transform 0.3s, box-shadow 0.3s;

        .hero-content .profession {

        }

        .rating {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .stars {
            color: #FFD700;
            font-size: 1.2rem;
        }

        .rating-text {
            font-size: 1rem;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: white;
            color: var(--dark-rose);
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: var(--dark-rose);
            color: white;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: white;

            border: 2px solid white;

            text-decoration: none;
            transition: all 0.3s;

        .btn-secondary:hover {
            background: white;
            color: var(--dark-rose);
        }

        .about {
            padding: 100px 0;
            background: white;
        }

        .about-content {
            display: grid;
            grid-template-columns: 1fr 2fr;

            align-items: center;

        .about-image {

        .about-image img {
            width: 300px;
            height: 300px;

            margin-bottom: 15px;
        }

        .service-card p {
            color: var(--text-light);
            line-height: 1.6;
        }

        /* Gallery Section */
        .gallery {
            padding: 100px 0;

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-placeholder {
            background: linear-gradient(135deg, var(--blush), var(--rose-gold));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            font-weight: 500;
        }

        /* Contact Section */
        .contact {
            padding: 100px 0;
            background: var(--cream);
        }

        .contact-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
        }

        .contact-info h3 {
            font-size: 2rem;
            color: var(--dark-rose);
            margin-bottom: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--blush), var(--rose-gold));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .info-text {
            font-size: 1.1rem;
            color: var(--text-dark);
        }

            display: flex;

        }

        .social-link {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--blush), var(--rose-gold));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .social-link:hover {
            transform: translateY(-3px);
        }

        .map-container {
            background: var(--rose-gold);
            border-radius: 15px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
        }

        .hours {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-top: 30px;
        }

        .hours h4 {
            font-size: 1.5rem;
            color: var(--dark-rose);
            margin-bottom: 20px;
            font-family: 'Cormorant Garamond', serif;
        }

        .hours-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--blush);
        }

        .hours-item:last-child {
            border-bottom: none;
        }

        /* Footer */
        .footer {
            background: var(--dark-rose);
            color: white;
            padding: 40px 0;
            text-align: center;
        }

        .footer p {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hero-content h1 {
                font-size: 2.5rem;
            }

            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }

            .about-content {
                grid-template-columns: 1fr;
                text-align: center;
                gap: 40px;
            }

            .contact-content {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .section-title {
                font-size: 2.5rem;
            }

            .about-text h2 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
