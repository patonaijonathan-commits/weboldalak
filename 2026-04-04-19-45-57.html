            overflow: hidden;
            animation: slideUp 0.8s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .profile-header {

            padding: 40px 30px;
            text-align: center;
            color: white;
        }
        
        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            margin: 0 auto 20px;
            display: block;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }
        
        .profile-image:hover {
            transform: scale(1.05);
        }
        
        .profile-name {
            font-size: 2.5rem;

        .profile-content {
            padding: 40px 30px;

            display: grid;

            gap: 30px;

        }
        
        .info-item {

            align-items: center;
            padding: 20px;

        }
        
        .info-item:hover {
            transform: translateY(-5px);

        .info-icon {
            font-size: 1.5rem;

        }

        }
        
        .phone-link:hover {

        }
        
        .gallery-section {

        }
        
        .section-title {
            font-size: 1.8rem;

            margin-bottom: 20px;
            text-align: center;

        }
