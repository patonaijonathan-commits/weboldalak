<!DOCTYPE html>

    <title>Instagram</title>
    <style>
        * {
            margin: 0;

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #262626;
        }

        .header {
            background-color: #ffffff;
            border-bottom: 1px solid #dbdbdb;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 8px 20px;
        }

        .header-content {
            max-width: 975px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 29px;
            font-weight: bold;
            color: #262626;
            text-decoration: none;
        }

        .nav-icons {
            display: flex;
            gap: 15px;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        .main-container {
            max-width: 935px;
            margin: 0 auto;
            padding-top: 80px;
            display: flex;
            gap: 30px;
        }

        .profile-section {
            flex: 1;
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .profile-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #dbdbdb;
        }

        .profile-info h1 {
            font-size: 28px;
            font-weight: 300;
            margin-bottom: 15px;
        }

        .profile-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .stat {
            font-size: 16px;
        }

        .stat strong {
            font-weight: 600;
        }

        .profile-details {
            margin-top: 20px;
        }

        .profile-details p {
            margin: 5px 0;
            font-size: 14px;
        }

        .posts-section {
            margin-top: 30px;
        }

        .posts-header {
            border-top: 1px solid #dbdbdb;
            padding: 15px 0;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #262626;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
        }

        .post-item {
            aspect-ratio: 1;
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .post-item:hover img {
            transform: scale(1.05);
        }

        .post-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            color: white;
            font-weight: 600;
        }

        .post-item:hover .post-overlay {
            opacity: 1;
        }

        .contact-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .contact-info h3 {
            margin-bottom: 10px;
            color: #262626;
            font-size: 16px;
        }

        .contact-info p {
            margin: 5px 0;
            font-size: 14px;
            color: #8e8e8e;
        }

        @media (max-width: 768px) {
            .main-container {
                padding: 80px 20px 20px;
                flex-direction: column;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }

            .profile-image {
                width: 100px;
                height: 100px;
            }

            .profile-stats {
                justify-content: center;
            }

            .posts-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
